name: Build app

# Runs when:
#   - You push a tag like v1.0.0 (produces a public Release with the .exe/.dmg attached)
#   - You manually click "Run workflow" in the GitHub Actions tab (for testing — builds but does not release)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm install

      - name: Build the Tauri app
        run: npm run tauri:build

      - name: Upload .exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: checklist-revision-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Create GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm install

      - name: Build the Tauri app
        run: npm run tauri:build

      - name: Upload .dmg as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: checklist-revision-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Attach .dmg to GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg
          draft: false
          prerelease: false
